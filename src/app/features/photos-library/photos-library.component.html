<div class="photo-grid">
  @for (photo of photos(); track photo.id) {
    <pl-photo
      [photo]="photo"
      [isFavorite]="isFavorite(photo.id)"
      (toggle)="toggleFavorite($event)"
    />
  }
</div>

<div class="scroll-anchor" plInfiniteScroll (scrolled)="loadMore()"></div>

<pl-loading-spinner [visible]="isLoading()" />
