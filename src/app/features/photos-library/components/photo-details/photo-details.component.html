<div class="detail-wrapper">
  <div class="photo-container">
    <img [ngSrc]="imageUrl" fill alt="Full screen photo" priority />
  </div>

  @if (isFavorite()) {
    <div class="actions">
      <button mat-flat-button color="warn" (click)="remove()">
        <mat-icon>delete</mat-icon>
        Remove from favorites
      </button>
    </div>
  }
</div>
