<nav class="navbar">
  <div class="nav-links">
    <a mat-button routerLink="/photos" routerLinkActive="active" class="nav-item">
      <mat-icon>photo_library</mat-icon>
      <span class="link-text">Photos</span>
    </a>

    <a mat-button routerLink="/favorites" routerLinkActive="active" class="nav-item">
      <mat-icon
        [matBadge]="favoriteCount()"
        [matBadgeHidden]="favoriteCount() === 0"
        matBadgeColor="accent"
        matBadgeSize="medium"
        matBadgeOverlap="false"
        aria-hidden="false"
      >
        favorite
      </mat-icon>
      <span class="link-text">Favorites</span>
    </a>
  </div>
  <mat-divider class="nav-divider" />
</nav>
